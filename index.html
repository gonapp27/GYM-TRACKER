<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#3b1d8f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Gonzalo Gym" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Gonzalo Gym Tracker V5.2</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">💪 Gonzalo Gym Tracker</p>
        <h1>V5.2 · Gym & Dieta</h1>
        <p class="top-subtitle">Offline · Backups · Calendario · kg/lb</p>
      </div>
      <div class="status-pill" id="onlineStatus">...</div>
    </header>

    <main>
      <section id="view" class="view" aria-live="polite"></section>
    </main>

    <nav class="bottom-nav" aria-label="Navegación principal">
      <button data-tab="today" class="active"><span>🏠</span><em>Hoy</em></button>
      <button data-tab="gym"><span>🏋️</span><em>Gym</em></button>
      <button data-tab="diet"><span>🍽️</span><em>Dieta</em></button>
      <button data-tab="progress"><span>📈</span><em>Progreso</em></button>
      <button data-tab="plan"><span>📋</span><em>Plan</em></button>
      <button data-tab="data"><span>💾</span><em>Datos</em></button>
    </nav>
  </div>

  <template id="toastTemplate"><div class="toast"></div></template>
  <script src="./app.js" defer></script>
</body>
</html>
